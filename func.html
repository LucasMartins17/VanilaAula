<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>StudyPath Forge Premium</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #6366f1; --bg: #fdfdfd; }
        * { 
            margin: 0; padding: 0; box-sizing: border-box; 
            user-select: none; -webkit-user-select: none; /* Remove o azul da seleção */
        }
        body { width: 100vw; height: 100vh; overflow: hidden; background: var(--bg); font-family: 'Inter', sans-serif; }
        
        /* Padrão de Pontos */
        #canvas-container {
            position: absolute; width: 100%; height: 100%;
            background-image: radial-gradient(#e5e7eb 1px, transparent 1px);
            background-size: 30px 30px;
        }

        canvas { position: absolute; top: 0; left: 0; touch-action: none; }

        .toolbar {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            background: white; padding: 8px; border-radius: 12px;
            display: flex; gap: 8px; box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            z-index: 100; border: 1px solid #ddd;
        }

        .tool {
            width: 45px; height: 45px; border-radius: 8px; border: none;
            background: none; cursor: pointer; display: flex; align-items: center; 
            justify-content: center; font-size: 1.2rem; transition: 0.2s; color: #444;
        }

        .tool.active { background: var(--primary); color: white; }
        
        #zoom-info {
            position: fixed; bottom: 20px; right: 20px; 
            background: white; padding: 5px 15px; border-radius: 20px;
            font-size: 12px; font-weight: bold; border: 1px solid #ddd; z-index: 100;
        }
    </style>
</head>
<body>

    <div id="canvas-container">
        <canvas id="mainCanvas"></canvas>
    </div>

    <div class="toolbar">
        <button class="tool" data-mode="hand"><i class="fas fa-hand-paper"></i></button>
        <button class="tool active" data-mode="draw"><i class="fas fa-pencil-alt"></i></button>
        <button class="tool" data-mode="text"><i class="fas fa-font"></i></button>
        <button class="tool" data-mode="rect"><i class="far fa-square"></i></button>
        <button class="tool" onclick="resetView()"><i class="fas fa-compress-arrows-alt"></i></button>
    </div>

    <div id="zoom-info">Zoom: 100%</div>

    <script>
        const canvas = document.getElementById('mainCanvas');
        const ctx = canvas.getContext('2d');
        const zoomDisplay = document.getElementById('zoom-info');

        let camera = { x: 0, y: 0, zoom: 1 };
        let mode = 'draw';
        let isDrawing = false;
        let lastMouse = { x: 0, y: 0 };
        
        // Array de objetos para persistência (Desenhos e Textos)
        let strokes = []; 
        let currentStroke = [];

        function init() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            render();
        }

        // --- LÓGICA DE COORDENADAS (MUITO IMPORTANTE) ---
        function screenToWorld(x, y) {
            return {
                x: (x - camera.x) / camera.zoom,
                y: (y - camera.y) / camera.zoom
            };
        }

        // --- RENDERIZAÇÃO ---
        function render() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.save();
            ctx.translate(camera.x, camera.y);
            ctx.scale(camera.zoom, camera.zoom);

            // Desenhar Roadmap Base (Exemplo)
            drawRoadmapBase();

            // Desenhar traços salvos
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            ctx.strokeStyle = '#6366f1';
            ctx.lineWidth = 3 / camera.zoom;

            strokes.forEach(stroke => {
                if(stroke.length < 2) return;
                ctx.beginPath();
                ctx.moveTo(stroke[0].x, stroke[0].y);
                stroke.forEach(p => ctx.lineTo(p.x, p.y));
                ctx.stroke();
            });

            // Desenhar traço atual
            if(isDrawing && mode === 'draw') {
                ctx.beginPath();
                ctx.moveTo(currentStroke[0].x, currentStroke[0].y);
                currentStroke.forEach(p => ctx.lineTo(p.x, p.y));
                ctx.stroke();
            }

            ctx.restore();
            zoomDisplay.innerText = `Zoom: ${Math.round(camera.zoom * 100)}%`;
            requestAnimationFrame(render);
        }

        function drawRoadmapBase() {
            ctx.fillStyle = "#6366f1";
            ctx.font = "bold 20px Inter";
            [[100, 100], [400, 250], [200, 500]].forEach((pos, i) => {
                ctx.beginPath();
                ctx.arc(pos[0], pos[1], 30, 0, Math.PI*2);
                ctx.fill();
                ctx.fillStyle = "white";
                ctx.fillText(i+1, pos[0]-7, pos[1]+7);
                ctx.fillStyle = "#6366f1";
            });
        }

        // --- EVENTOS ---
        canvas.addEventListener('mousedown', e => {
            isDrawing = true;
            lastMouse = { x: e.clientX, y: e.clientY };
            if(mode === 'draw') currentStroke = [screenToWorld(e.clientX, e.clientY)];
        });

        window.addEventListener('mousemove', e => {
            if(!isDrawing) return;

            if(mode === 'hand') {
                camera.x += e.clientX - lastMouse.x;
                camera.y += e.clientY - lastMouse.y;
            } else if(mode === 'draw') {
                currentStroke.push(screenToWorld(e.clientX, e.clientY));
            }
            lastMouse = { x: e.clientX, y: e.clientY };
        });

        window.addEventListener('mouseup', () => {
            if(isDrawing && mode === 'draw') strokes.push(currentStroke);
            isDrawing = false;
        });

        // ZOOM com Wheel
        canvas.addEventListener('wheel', e => {
            e.preventDefault();
            const delta = e.deltaY > 0 ? 0.9 : 1.1;
            const mouseWorld = screenToWorld(e.clientX, e.clientY);
            camera.zoom *= delta;
            camera.x = e.clientX - mouseWorld.x * camera.zoom;
            camera.y = e.clientY - mouseWorld.y * camera.zoom;
        }, { passive: false });

        // TOOLBAR
        document.querySelectorAll('.tool').forEach(t => {
            t.onclick = () => {
                if(!t.dataset.mode) return;
                document.querySelectorAll('.tool').forEach(btn => btn.classList.remove('active'));
                t.classList.add('active');
                mode = t.dataset.mode;
            }
        });

        function resetView() { camera = { x: 0, y: 0, zoom: 1 }; }

        window.addEventListener('resize', init);
        init();
    </script>
</body>
</html>
