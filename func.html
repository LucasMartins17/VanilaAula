<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>StudyPath Forge | Canvas Engine</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #fdfdfd;
            --dot-color: #e5e7eb;
            --primary: #6366f1;
            --active: #a855f7;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        
        body { 
            width: 100vw; height: 100vh; overflow: hidden;
            background-color: var(--bg-color);
            background-image: radial-gradient(var(--dot-color) 1px, transparent 1px);
            background-size: 30px 30px;
        }

        /* Camada do Roadmap */
        #viewport {
            position: absolute; width: 100%; height: 100%;
            cursor: default; transition: transform 0.1s ease-out;
        }

        #roadmap-svg { position: absolute; width: 2000px; height: 2000px; pointer-events: none; }

        .step {
            position: absolute; width: 60px; height: 60px;
            background: white; border: 3px solid var(--primary);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-weight: bold; z-index: 2; transform: translate(-50%, -50%);
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        /* Canvas de Desenho */
        #draw-canvas { position: absolute; top: 0; left: 0; z-index: 5; touch-action: none; }

        /* Toolbar Estilo Excalidraw */
        .toolbar {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            background: white; padding: 8px; border-radius: 12px;
            display: flex; gap: 8px; box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            z-index: 100; border: 1px solid #ddd;
        }

        .tool {
            width: 40px; height: 40px; border-radius: 8px; border: none;
            background: none; cursor: pointer; color: #555; font-size: 1.1rem;
            display: flex; align-items: center; justify-content: center; transition: 0.2s;
        }

        .tool.active { background: var(--primary); color: white; }

        /* Elementos de Texto Dinâmicos */
        .text-box {
            position: absolute; min-width: 50px; min-height: 20px;
            border: 1px dashed var(--primary); padding: 5px;
            background: transparent; outline: none; z-index: 6;
            font-size: 16px; color: var(--text);
        }

    </style>
</head>
<body>

    <div id="viewport">
        <svg id="roadmap-svg">
            <path id="snake-path" d="" fill="none" stroke="#6366f1" stroke-width="4" stroke-dasharray="8,8" opacity="0.3"/>
        </svg>
        <div class="step" style="left: 200px; top: 200px;">1</div>
        <div class="step" style="left: 500px; top: 350px;">2</div>
        <div class="step" style="left: 300px; top: 600px;">3</div>
    </div>

    <canvas id="draw-canvas"></canvas>

    <div class="toolbar">
        <button class="tool active" data-mode="select" title="Seleção"><i class="fas fa-mouse-pointer"></i></button>
        <button class="tool" data-mode="hand" title="Mover"><i class="fas fa-hand-paper"></i></button>
        <button class="tool" data-mode="draw" title="Lápis"><i class="fas fa-pencil-alt"></i></button>
        <button class="tool" data-mode="text" title="Texto"><i class="fas fa-font"></i></button>
        <button class="tool" data-mode="rect" title="Quadrado"><i class="far fa-square"></i></button>
        <div style="width: 1px; background: #eee; margin: 0 5px;"></div>
        <button class="tool" onclick="location.reload()" title="Limpar"><i class="fas fa-trash"></i></button>
    </div>

    <script>
        const canvas = document.getElementById('draw-canvas');
        const ctx = canvas.getContext('2d');
        const viewport = document.getElementById('viewport');
        const tools = document.querySelectorAll('.tool');

        let mode = 'select'; // select, hand, draw, text, rect
        let isDrawing = false;
        let startX, startY;
        
        // Ajuste de Tamanho
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        // Alternar Ferramentas
        tools.forEach(tool => {
            tool.addEventListener('click', () => {
                if(!tool.dataset.mode) return;
                tools.forEach(t => t.classList.remove('active'));
                tool.classList.add('active');
                mode = tool.dataset.mode;
                
                // Mudar cursor baseado no modo
                if(mode === 'hand') canvas.style.cursor = 'grab';
                else if(mode === 'draw') canvas.style.cursor = 'crosshair';
                else canvas.style.cursor = 'default';
            });
        });

        // Lógica de Eventos
        canvas.addEventListener('mousedown', startAction);
        canvas.addEventListener('mousemove', doAction);
        canvas.addEventListener('mouseup', endAction);

        // Mobile
        canvas.addEventListener('touchstart', (e) => startAction(e.touches[0]));
        canvas.addEventListener('touchmove', (e) => { e.preventDefault(); doAction(e.touches[0]); });
        canvas.addEventListener('touchend', endAction);

        function startAction(e) {
            isDrawing = true;
            startX = e.clientX;
            startY = e.clientY;

            if (mode === 'text') {
                createTextBox(e.clientX, e.clientY);
                isDrawing = false; 
            }
            
            ctx.beginPath();
            ctx.moveTo(startX, startY);
        }

        function doAction(e) {
            if (!isDrawing) return;

            if (mode === 'draw') {
                ctx.lineWidth = 3;
                ctx.lineCap = 'round';
                ctx.strokeStyle = '#6366f1';
                ctx.lineTo(e.clientX, e.clientY);
                ctx.stroke();
            } 
            else if (mode === 'hand') {
                // Simula o movimento da tela (viewport)
                const dx = e.clientX - startX;
                const dy = e.clientY - startY;
                viewport.style.transform = `translate(${dx}px, ${dy}px)`;
                // Aqui teria que mover o canvas também em um sistema real, 
                // mas para o protótipo vamos manter o foco no desenho fixo.
            }
            else if (mode === 'rect') {
                // Lógica de desenho de retângulo temporário (opcional)
            }
        }

        function endAction() {
            isDrawing = false;
        }

        // Função para criar caixa de texto estilo Excalidraw
        function createTextBox(x, y) {
            const input = document.createElement('div');
            input.className = 'text-box';
            input.contentEditable = true;
            input.style.left = x + 'px';
            input.style.top = y + 'px';
            document.body.appendChild(input);
            
            setTimeout(() => input.focus(), 10);

            input.addEventListener('blur', () => {
                if (input.innerText.trim() === "") input.remove();
            });
        }

        // Desenhar Linhas do Roadmap (Simples)
        function drawRoadmap() {
            const path = document.getElementById('snake-path');
            const steps = document.querySelectorAll('.step');
            let d = `M 200 200 Q 350 200, 500 350 T 300 600`;
            path.setAttribute('d', d);
        }
        drawRoadmap();

    </script>
</body>
</html>
